<template>
  <div>
    <section class="videos">
      <video playsinline loop muted></video>
      <video playsinline loop muted></video>
      <video playsinline loop muted></video>
      <video playsinline loop muted></video>
      <video playsinline loop muted></video>
      <video playsinline loop muted></video>
    </section>
    <section class="screen">
      <canvas :width="width" :height="height"></canvas>
    </section>
    <section class="ui" @mousemove="showUI">
      <canvas :width="width" :height="height"></canvas>
    </section>
  </div>
</template>

<script>
  import Screen from "../js/screen.js";
  import { State } from "../js/state.js";

  class OutputScreen extends BuildingBlocks {
    constructor() {
      super({
        editable: false,
      });

      this.ctx = null;
      this.screen = null;
      this.window = null;

      this.opacity = {
        value: 0,
        timeout: null,
      };

      this.state = new State();

      //// UI Elements ////
      this.ui = null;
      this.pointSize = 10;
      this.layerColor = {
        input: [255, 0, 0],
        output: [0, 0, 255],
      };

      this.layer = "output";
      this.moving = false;
      this.shifted = false;
      this.selected = null;
      this.selectedShapes = [];
    }

    static get observedProperties() {
      return ["width", "height", "editable"];
    }

    connected() {
      this.videos = [...this.querySelectorAll(".videos video")];
      this.ctx = this.querySelector(".screen canvas").getContext("webgl");
      this.ui = this.querySelector(".ui canvas").getContext("2d");

      this.screen = new Screen(this.state, this.ctx, this.videos, {
        width: this.width,
        height: this.height,
      });
      this.screen.play();

      this.state.listen("files", (files, oldFiles) => {
        if (!this.screen) {
          return;
        }

        let { loading, loading_time } = this.state;

        if (loading !== null) {
          let file = files[loading];

          if (!!file) {
            this.screen.loadVideo(loading, file, loading_time);
          } else {
            this.screen.removeVideo(loading);
          }
        } else {
          let newMediaIdx = files.findIndex((file, idx) => {
            return (
              file !== null &&
              file.kind === "videoinput" &&
              file.deviceId !== oldFiles[idx]?.deviceId
            );
          });

          this.screen.setMedia(newMediaIdx, files[newMediaIdx].deviceId);
        }
      });

      /****** Handling Effect Code Updates ******/
      // Listen for added effects, and effect code updates then
      // create/update the program in the screen
      this.state.listen("effects", (effects, oldEffects) => {
        let additions = effects.filter(
          (e) => !oldEffects.find((ef) => ef.id === e.id),
        );

        let deletions = oldEffects.filter(
          (e) => !effects.find((ef) => ef.id === e.id),
        );

        additions.map((e, idx) => {
          e.listen("code", (code) => {
            if (code !== "") {
              this.screen.updateEffect(e);
            }
          });

          if (e.code !== "") {
            this.screen.createEffect(e);
          }
        });

        deletions.map((e, idx) => {
          this.screen.removeEffect(e);
        });
      });

      this.state.effects.map((e, idx) => {
        e.listen("code", (code, oldCode) => {
          if (code !== "") {
            this.screen.updateEffect(e);
          }
        });
      });
      /****** End Handling Effect Code Updates ******/

      this.state.slots.map((s) => {
        s.listen("target", () => {
          if (!this.screen) {
            return;
          }

          this.screen.updateSlots();
        });
      });

      this.state.scripts.map((s) => {
        s.listen("code", () => {
          if (!this.screen) {
            return;
          }

          this.screen.updateSlots();
        });
      });

      // Metronome
      this.state.listen("bpm", (bpm) => {
        this.screen.bpm = bpm;
      });

      this.state.listen("beat", (beat) => {
        this.screen.beat = beat;
        this.screen.beatTick = true;
      });

      if (this.editable) {
        window.addEventListener("mousedown", (e) => {
          this.select(e);
          this.startMove();
        });

        window.addEventListener("mouseup", () => {
          this.stopMove();
        });

        window.addEventListener("mousemove", (e) => {
          this.movePoint(e);
        });

        window.addEventListener("keydown", (e) => {
          if (e.keyCode === 32) {
            this.toggleLayer();
          }

          if (e.keyCode === 16) {
            this.shiftDown();
          }

          if (e.keyCode === 39) {
            this.handleRight();
          }

          if (e.keyCode === 37) {
            this.handleLeft();
          }

          if (e.keyCode === 38) {
            this.handleUp();
          }

          if (e.keyCode === 40) {
            this.handleDown();
          }
        });

        window.addEventListener("keyup", (e) => {
          if (e.keyCode === 16) {
            this.shiftUp();
          }
        });
      }
    }

    removeVideo(idx) {
      this.screen.removeVideo(idx);
    }

    loadVideo(idx, file) {
      this.screen.loadVideo(idx, file);
    }

    popout() {
      if (this.window !== null) {
        console.log("Window already loaded");
        return;
      }

      // this.screen.stop();
      // this.screen = null;
      this.window = window.open("./screen.html");

      let poll = () => {
        if (!!this.window && this.window.closed) {
          this.window = null;
          this.screen = new Screen(this.state, this.ctx, this.videos, {
            width: this.width,
            height: this.height,
          });
          // this.screen.play();
        } else {
          setTimeout(() => {
            poll();
          }, 100);
        }
      };

      poll();
    }

    ///// UI /////
    showUI() {
      let { opacity } = this;

      opacity.value = 1;
      if (opacity.timer !== null) {
        clearTimeout(opacity.timer);
      }

      let opacityFn = () => {
        opacity.value -= 0.02;

        if (opacity.value > 0) {
          opacity.timer = setTimeout(opacityFn, 30);
        } else {
          opacity.value = 0;
          opacity.timer = null;
        }

        this.drawUI();
      };

      opacity.timer = setTimeout(opacityFn, 5000);
      this.drawUI();
    }

    toggleLayer() {
      this.layer = this.layer === "input" ? "output" : "input";
    }

    startMove() {
      this.moving = true;
    }

    stopMove() {
      this.moving = false;
    }

    shiftDown() {
      this.shifted = true;
    }

    shiftUp() {
      this.shifted = false;
    }

    handleLeft() {
      if (!!this.selected && !this.shifted) {
        this.move([-1, 0]);
      } else {
        this.nextPoint(-1);
      }
    }

    handleRight() {
      if (!!this.selected && !this.shifted) {
        return this.move([1, 0]);
      }

      if (this.shifted) {
        this.nextPoint(1);
      }
    }

    handleUp() {
      if (!!this.selected && !this.shifted) {
        this.move([0, -1]);
      } else {
        this.nextShape(-1);
      }
    }

    handleDown() {
      if (!!this.selected && !this.shifted) {
        this.move([0, 1]);
      } else {
        this.nextShape(1);
      }
    }

    drawUI() {
      let ctx = this.ui;
      let { width, height } = ctx.canvas;

      ctx.clearRect(0, 0, width, height);

      this.drawShapes();
    }

    select(e) {
      if (this.selectDisabled) {
        return;
      }

      let { shapes } = this.state;
      let { selectedShape, selectedPoint } = this;

      let relX = e.pageX / window.innerWidth;
      let relY = e.pageY / window.innerHeight;

      let selectedShapes = [];
      for (var i = 0; i < shapes.length; i++) {
        let shape = shapes[i];
        let { type } = shapes[i];

        if (type === "tri" || type === "quad") {
          let selected = this.checkTriangle(relX, relY, shape, i);
          if (selected !== null) {
            selectedShapes.push(selected);
          }
        }
      }

      selectedShapes.sort((a, b) => {
        return (b.points || []).length - (a.points || []).length;
      });

      let selected = this.selected;
      let first = selectedShapes[0] || null;
      let current = selectedShapes.find((s) => {
        return (
          s.shape === selected?.shape &&
          (s.points || []).every((points) => {
            return (selected?.points || []).find(
              (p) => p[0] === points[0] && p[1] === points[1],
            );
          })
        );
      });

      this.selectedShapes = selectedShapes;
      if (
        !current ||
        (first?.points || []).length > (current?.points || []).length ||
        this.shifted
      ) {
        this.selectNext();
      }
      this.drawUI();
    }

    selectNext() {
      let { selected, selectedShapes } = this;

      let current = selectedShapes.findIndex((s) => {
        return (
          s.shape === selected?.shape &&
          (s.points || []).every((points) => {
            return (selected?.points || []).find(
              (p) => p[0] === points[0] && p[1] === points[1],
            );
          })
        );
      });

      if (current >= 0) {
        this.selected = selectedShapes[(current + 1) % selectedShapes.length];
      } else {
        this.selected = selectedShapes[0] || null;
      }
    }

    checkTriangle(relX, relY, shape, shapeIdx) {
      let { tris } = shape;

      let points = this.checkTrianglePoints(relX, relY, shape, this.layer);
      if (points.length > 0) {
        return {
          shape: shapeIdx,
          points: points,
        };
      }

      for (let i = 0; i < tris.length; i++) {
        let p = tris[i][this.layer];

        let x = relX;
        let y = relY;
        let ax = p[0][0];
        let ay = p[0][1];
        let bx = p[1][0];
        let by = p[1][1];
        let cx = p[2][0];
        let cy = p[2][1];

        let det = (bx - ax) * (cy - ay) - (by - ay) * (cx - ax);

        if (
          det * ((bx - ax) * (y - ay) - (by - ay) * (x - ax)) >= 0 &&
          det * ((cx - bx) * (y - by) - (cy - by) * (x - bx)) >= 0 &&
          det * ((ax - cx) * (y - cy) - (ay - cy) * (x - cx)) >= 0
        ) {
          return {
            shape: shapeIdx,
            points: [],
          };
        }
      }

      return null;
    }

    checkTrianglePoints(relX, relY, shape, layer) {
      let { pointSize } = this;
      let { tris } = shape;

      let selected = [];

      let offsetX = (pointSize >> 1) * (1 / window.innerWidth);
      let offsetY = (pointSize >> 1) * (1 / window.innerHeight);
      for (let i = 0; i < tris.length; i++) {
        let points = tris[i][layer];

        for (let j = 0; j < points.length; j++) {
          let x = points[j][0];
          let y = points[j][1];

          let minX = Math.min(Math.max(x - offsetX, 0), 1 - offsetX * 2);
          let minY = Math.min(Math.max(y - offsetY, 0), 1 - offsetY * 2);
          let maxX = Math.max(Math.min(x + offsetX, 1), offsetX * 2);
          let maxY = Math.max(Math.min(y + offsetY, 1), offsetY * 2);

          if (relX <= maxX && relX >= minX && relY <= maxY && relY >= minY) {
            selected.push([i, j]);
          }
        }
      }

      return selected;
    }

    drawShapes() {
      let ctx = this.ui;

      let { selected } = this;
      let { shapes } = this.state;
      let { width, height } = ctx.canvas;

      for (var i = 0; i < shapes.length; i++) {
        if (!!selected && selected.shape === i) {
          continue;
        }

        this.drawShape(shapes[i]);
      }

      if (!!selected) {
        this.drawShape(shapes[selected.shape]);
      }
    }

    drawShape(shape) {
      let { type } = shape;

      if (type === "tri") {
        this.drawTri(shape);
      }

      if (type === "quad") {
        this.drawQuad(shape);
      }
    }

    drawTri(shape) {
      let ctx = this.ui;
      let shapeIdx = this.state.shapes.indexOf(shape);

      let { width, height } = ctx.canvas;
      let { tris } = shape;
      let { selected } = this;

      for (var j = 0; j < tris.length; j++) {
        let points = tris[j][this.layer];

        for (var k = 0; k < points.length; k++) {
          let isSelectedPoint =
            selected?.shape === shapeIdx &&
            (selected?.points || []).find((t) => t[0] === j && t[1] === k);

          let x = (width * points[k][0]) | 0;
          let y = (height * points[k][1]) | 0;

          this.drawPoint(x, y, isSelectedPoint);
        }

        this.tracePoints(
          points[0][0],
          points[0][1],
          points[1][0],
          points[1][1],
          selected?.shape === shapeIdx,
        );
        this.tracePoints(
          points[1][0],
          points[1][1],
          points[2][0],
          points[2][1],
          selected?.shape === shapeIdx,
        );
        this.tracePoints(
          points[2][0],
          points[2][1],
          points[0][0],
          points[0][1],
          selected?.shape === shapeIdx,
        );
      }
    }

    drawQuad(shape) {
      let ctx = this.ui;
      let shapeIdx = this.state.shapes.indexOf(shape);

      let { selected } = this;
      let { width, height } = ctx.canvas;
      let { tris } = shape;

      for (var j = 0; j < tris.length; j++) {
        let points = tris[j][this.layer];

        for (var k = 0; k < points.length; k++) {
          let isSelectedPoint =
            selected?.shape === shapeIdx &&
            (selected?.points || []).find((t) => t[0] === j && t[1] === k);

          let x = (width * points[k][0]) | 0;
          let y = (height * points[k][1]) | 0;

          this.drawPoint(x, y, isSelectedPoint);
        }
      }

      let points1 = tris[0][this.layer];
      let points2 = tris[1][this.layer];

      this.tracePoints(
        points1[0][0],
        points1[0][1],
        points1[1][0],
        points1[1][1],
        selected?.shape === shapeIdx,
      );

      this.tracePoints(
        points1[1][0],
        points1[1][1],
        points1[2][0],
        points1[2][1],
        selected?.shape === shapeIdx,
      );
      this.tracePoints(
        points1[2][0],
        points1[2][1],
        points2[2][0],
        points2[2][1],
        selected?.shape === shapeIdx,
      );
      this.tracePoints(
        points2[2][0],
        points2[2][1],
        points1[0][0],
        points1[0][1],
        selected?.shape === shapeIdx,
      );
    }

    tracePoints(x1, y1, x2, y2, selected) {
      let ctx = this.ui;
      let clr = selected ? [255, 255, 0] : this.layerColor[this.layer];

      let { width, height } = ctx.canvas;

      ctx.strokeStyle = `rgba(${clr[0]},${clr[1]},${clr[2]},${this.opacity.value})`;

      let originX = Math.max((width * x1) | 0, 5);
      let originY = Math.max((height * y1) | 0, 5);

      let destX = Math.max((width * x2) | 0, 5);
      let destY = Math.max((height * y2) | 0, 5);

      ctx.beginPath();
      ctx.moveTo(originX, originY);

      ctx.lineTo(destX, destY);

      ctx.lineTo(originX, originY);
      ctx.stroke();
      ctx.closePath();
    }

    drawPoint(x, y, selected) {
      let ctx = this.ui;
      let { width, height } = ctx.canvas;

      let clr = selected ? [255, 255, 0] : this.layerColor[this.layer];
      let opacity = this.opacity.value;

      let offset = this.pointSize >> 1;
      let minX = Math.min(Math.max(x - offset, 0), width - this.pointSize);
      let minY = Math.min(Math.max(y - offset, 0), height - this.pointSize);

      ctx.fillStyle = `rgba(${clr[0]},${clr[1]},${clr[2]},${opacity})`;
      ctx.fillRect(minX, minY, this.pointSize, this.pointSize);

      return true;
    }

    checkPoint(e, x, y, objIdx, pntIdx) {
      let ctx = this.ui;

      let { width, height } = ctx.canvas;

      let offset = this.pointSize >> 1;
      let mouseX = ctx.canvas.width * (e.pageX / window.innerWidth);
      let mouseY = ctx.canvas.height * (e.pageY / window.innerHeight);

      let minX = Math.min(Math.max(x - offset, 0), width - this.pointSize);
      let minY = Math.min(Math.max(y - offset, 0), height - this.pointSize);
      let maxX = Math.max(Math.min(x + offset, width), this.pointSize);
      let maxY = Math.max(Math.min(y + offset, height), this.pointSize);

      if (
        mouseX <= maxX &&
        mouseX >= minX &&
        mouseY <= maxY &&
        mouseY >= minY
      ) {
        this.selectedPoint = [objIdx, pntIdx];
        return false;
      }

      return true;
    }

    move(movement) {
      this.showUI();

      let x = movement[0];
      let y = movement[1];

      let { selected } = this;
      if (!selected || selected.points.length < 1) {
        return;
      }

      let shape = this.state.shapes[selected.shape];

      for (let i = 0; i < selected.points.length; i++) {
        let points =
          shape.tris[selected.points[i][0]][this.layer][selected.points[i][1]];

        points[0] += (1 / window.innerWidth) * x;
        points[1] += (1 / window.innerHeight) * y;
      }

      if (shape.type === "quad" && this.layer === "input") {
        if (selected.points[0][0] === 0 && selected.points[0][1] === 1) {
          shape.tris[0][this.layer][0][1] += (1 / window.innerHeight) * y;
          shape.tris[1][this.layer][0][1] += (1 / window.innerHeight) * y;
          shape.tris[0][this.layer][2][0] += (1 / window.innerWidth) * x;
          shape.tris[1][this.layer][1][0] += (1 / window.innerWidth) * x;
        }

        if (selected.points[0][0] === 0 && selected.points[0][1] === 0) {
          shape.tris[0][this.layer][1][1] += (1 / window.innerHeight) * y;
          shape.tris[1][this.layer][2][0] += (1 / window.innerWidth) * x;
        }

        if (selected.points[0][0] === 0 && selected.points[0][1] === 2) {
          shape.tris[1][this.layer][2][1] += (1 / window.innerHeight) * y;
          shape.tris[0][this.layer][1][0] += (1 / window.innerWidth) * x;
        }

        if (selected.points[0][0] === 1 && selected.points[0][1] === 2) {
          shape.tris[0][this.layer][2][1] += (1 / window.innerHeight) * y;
          shape.tris[1][this.layer][1][1] += (1 / window.innerHeight) * y;

          shape.tris[0][this.layer][0][0] += (1 / window.innerWidth) * x;
          shape.tris[1][this.layer][0][0] += (1 / window.innerWidth) * x;
        }
      }

      shape.tris = [...shape.tris];

      this.drawUI();
    }

    movePoint(e) {
      this.showUI();

      if (!this.moving || !this.selected) {
        return;
      }

      let x = e.pageX / window.innerWidth;
      let y = e.pageY / window.innerHeight;
      let { shapes } = this.state;
      let { selected, layer } = this;

      let shape = shapes[selected.shape];
      let points = selected.points || [];

      [x, y] = this.snapPoint(x, y);

      for (let i = 0; i < points.length; i++) {
        let tri = shape.tris[points[i][0]];
        tri[layer][points[i][1]][0] = x;
        tri[layer][points[i][1]][1] = y;
      }

      if (shape.type === "quad" && this.layer === "input") {
        if (selected.points[0][0] === 0 && selected.points[0][1] === 1) {
          shape.tris[0][this.layer][0][1] = y;
          shape.tris[1][this.layer][0][1] = y;
          shape.tris[0][this.layer][2][0] = x;
          shape.tris[1][this.layer][1][0] = x;
        }

        if (selected.points[0][0] === 0 && selected.points[0][1] === 0) {
          shape.tris[0][this.layer][1][1] = y;
          shape.tris[1][this.layer][2][0] = x;
        }

        if (selected.points[0][0] === 0 && selected.points[0][1] === 2) {
          shape.tris[1][this.layer][2][1] = y;
          shape.tris[0][this.layer][1][0] = x;
        }

        if (selected.points[0][0] === 1 && selected.points[0][1] === 2) {
          shape.tris[0][this.layer][2][1] = y;
          shape.tris[1][this.layer][1][1] = y;

          shape.tris[0][this.layer][0][0] = x;
          shape.tris[1][this.layer][0][0] = x;
        }
      }

      shape.tris = [...shape.tris];
    }

    snapPoint(relX, relY) {
      let { selected } = this;
      let { shapes } = this.state;

      const getPoint = (match, shape, layer) => {
        let triIdx = match[0];
        let pointIdx = match[1];

        let tri = shape.tris[triIdx][layer];
        let point = tri[pointIdx];

        return [...point];
      };

      let oppLayer = this.layer === "input" ? "output" : "input";
      let matches = this.checkTrianglePoints(
        relX,
        relY,
        shapes[selected.shape],
        oppLayer,
      );

      if (matches.length > 0) {
        return getPoint(matches[0], shapes[selected.shape], oppLayer);
      }

      for (let i = 0; i < shapes.length; i++) {
        if (i === selected.shape) {
          continue;
        }

        let matches = this.checkTrianglePoints(
          relX,
          relY,
          shapes[i],
          this.layer,
        );

        if (matches.length > 0) {
          return getPoint(matches[0], shapes[i], this.layer);
        }
      }

      return [relX, relY];
    }

    nextPoint(interval) {
      this.showUI();

      if (this.state.shapes.length === 0) {
        return;
      }

      let { selected } = this;

      let shape = null;
      let tri = null;
      let point = null;

      if (!selected) {
        shape = 0;
        tri = 0;
        point = 2;
      } else {
        shape = selected.shape;
        tri = (selected.points[0] || [])[0] ?? 0;
        point = (selected.points[0] || [])[1] ?? 2;
      }

      let type = this.state.shapes[shape].type;
      if (type === "tri") {
        let next = point + interval < 0 ? 2 : (point + interval) % 3;

        this.selected = {
          shape: shape,
          points: [[tri, next]],
        };
      } else if (type === "quad") {
        if ((tri === 0 && point === 0) || (tri === 1 && point === 0)) {
          if (interval > 0) {
            this.selected = {
              shape: shape,
              points: [[0, 1]],
            };
          } else {
            this.selected = {
              shape: shape,
              points: [[1, 2]],
            };
          }
        } else if (tri === 0 && point === 1) {
          if (interval > 0) {
            this.selected = {
              shape: shape,
              points: [
                [0, 2],
                [1, 1],
              ],
            };
          } else {
            this.selected = {
              shape: shape,
              points: [
                [0, 0],
                [1, 0],
              ],
            };
          }
        } else if ((tri === 0 && point === 2) || (tri === 1 && point === 1)) {
          if (interval > 0) {
            this.selected = {
              shape: shape,
              points: [[1, 2]],
            };
          } else {
            this.selected = {
              shape: shape,
              points: [[0, 1]],
            };
          }
        } else if (tri === 1 && point === 2) {
          if (interval > 0) {
            this.selected = {
              shape: shape,
              points: [
                [0, 0],
                [1, 0],
              ],
            };
          } else {
            this.selected = {
              shape: shape,
              points: [
                [0, 2],
                [1, 1],
              ],
            };
          }
        }
      }

      this.drawUI();
    }

    nextShape(interval) {
      this.showUI();

      if (this.state.shapes.length === 0) {
        return;
      }

      let { selected } = this;
      let { shapes } = this.state;

      let next;
      if (!selected) {
        next = interval < 0 ? shapes.length - 1 : 0;
      } else {
        next =
          selected.shape + interval < 0
            ? shapes.length - 1
            : (selected.shape + interval) % shapes.length;
      }

      this.selected = {
        shape: next,
        points: [],
      };

      this.drawUI();
    }
  }
</script>
